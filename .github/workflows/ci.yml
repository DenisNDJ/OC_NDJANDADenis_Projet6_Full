name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Run tests
        run: bash ./run_all_test.sh

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Tests
          path: test_result/**/*.xml
          reporter: java-junit 

  build-and-push-image:
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_GITHUB }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: back
          push: true
          tags: ghcr.io/denisndj/oc_ndjandadenis_projet6_back:latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: front
          push: true
          tags: ghcr.io/denisndj/oc_ndjandadenis_projet6_front:latest

  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/exec

      - name: Build Docker image
        run: cd front

      - name: build
        run: npm ci

      - name: build
        run: npm run build

      - name: Build Docker image
        run: docker build . --file front/Dockerfile --tag oc_ndjandadenis_projet6_front:latest

      - name: Release + Docker versioning (no push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release \
            --branches main \
            --plugins @semantic-release/commit-analyzer,@semantic-release/release-notes-generator,@semantic-release/exec \
            --exec.publishCmd "docker tag oc_ndjandadenis_projet6_front:latest oc_ndjandadenis_projet6_front:${nextRelease.version} && docker tag oc_ndjandadenis_projet6_front:${nextRelease.version} oc_ndjandadenis_projet6_front:latest"
