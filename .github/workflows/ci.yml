name: CI (Test/Build/Release)

on:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dépendances Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Dépendances Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Run tests
        run: bash ./run_all_test.sh

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Tests
          path: test_result/**/*.xml
          reporter: java-junit 

  build-and-push-image:
    needs: test
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_GITHUB }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: back
          push: true
          tags: ghcr.io/denisndj/oc_ndjandadenis_projet6_back:latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: front
          push: true
          tags: ghcr.io/denisndj/oc_ndjandadenis_projet6_front:latest

  release:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Semantic Release Front
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          working_directory: front
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}

      - name: Semantic Release Front
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          working_directory: back
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}

  docker-retag-image:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest

    env:
      FRONT_IMAGE_NAME: ghcr.io/denisndj/oc_ndjandadenis_projet6_front
      BACK_IMAGE_NAME: ghcr.io/denisndj/oc_ndjandadenis_projet6_back
      SOURCE_TAG: latest
      VERSION: ${{ needs.release.outputs.new_release_version }}

    steps:
      - name: Connexion GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN_GITHUB }}

      - name: Nouveau tag front
        run: |
          docker pull $FRONT_IMAGE_NAME:$SOURCE_TAG
          docker tag $FRONT_IMAGE_NAME:$SOURCE_TAG $FRONT_IMAGE_NAME:v$VERSION
          docker push $FRONT_IMAGE_NAME:v$VERSION

      - name: Nouveau tag back
        run: |
          docker pull $BACK_IMAGE_NAME:$SOURCE_TAG
          docker tag $BACK_IMAGE_NAME:$SOURCE_TAG $BACK_IMAGE_NAME:v$VERSION
          docker push $BACK_IMAGE_NAME:v$VERSION
